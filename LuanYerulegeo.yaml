tun:
  enable: true
  stack: mixed
  dns-hijack:
    - "0.0.0.0:53"
    - "tcp://0.0.0.0:53"
    - "any:53"
  auto-detect-interface: true
  auto-route: true
  auto-redirect: true
  strict-route: false
  endpoint-independent-nat: true

sniffer:
  enable: true
  override-destination: true
  parse-pure-ip: true
  force-dns-mapping: true
  sniff:
    TLS:
      ports: [443, 8443]
    HTTP:
      ports: [80, 8080-8880]
      override-destination: true
  skip-domain:
    - "+.apple.com"
    - "+.qq.com"
    - "+.wechat.com"
    
dns:
  enable: true
  listen: 0.0.0.0:1053
  ipv6: false
  enhanced-mode: fake-ip
  fake-ip-range: 198.18.0.1/16
  respect-rules: true

  proxy-server-nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query

  nameserver:
    - https://223.5.5.5/dns-query
    - https://1.12.12.12/dns-query

  default-nameserver:
    - 223.5.5.5
    - 119.29.29.29

  fallback: []
  fallback-filter: {}
  fake-ip-filter:
    - '*.*.lan'
    - '*.*.local'
    - 'geosite:cn'
    
proxies: 
  - name: "🟢 直连"
    type: direct
    udp: true
    


