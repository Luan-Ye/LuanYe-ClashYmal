  - {name: 英国自动, <<: *LuanYe2,   filter: *UK, icon: https://raw.githubusercontent.com/Vbaethon/HOMOMIX/main/Icon/Color/UK.png}


rules:
  
  - RULE-SET,LuanYe3,REJECT,no-resolve

  - RULE-SET,private_ip,DIRECT,no-resolve
  - RULE-SET,private_domain,DIRECT

  - RULE-SET,apple_domain,DIRECT
  - RULE-SET,apple_ip,DIRECT

  - RULE-SET,cn_domain,DIRECT
  - RULE-SET,cn_ip,DIRECT,no-resolve

  - RULE-SET,ai,ChatGPT
  - RULE-SET,github_domain,GitHub
  - RULE-SET,youtube_domain,YouTube
  - RULE-SET,google_domain,Google
  - RULE-SET,Pixiv_domain,Pixiv
  - RULE-SET,twitter_domain,twitter
  - RULE-SET,telegram_domain,Telegram
  - RULE-SET,PornHub_domain,Pornhub

  - RULE-SET,google_ip,Google,no-resolve
  - RULE-SET,twitter_ip,twitter,no-resolve
  - RULE-SET,telegram_ip,Telegram,no-resolve

  - RULE-SET,geolocation-!cn,一键代理,no-resolve

  - RULE-SET,proxylite,一键代理

  - MATCH,漏网之鱼

rule-anchor:
  ip: &ip {type: http, interval: 86400, behavior: ipcidr, format: mrs}
  domain: &domain {type: http, interval: 86400, behavior: domain, format: mrs}
  class: &class {type: http, interval: 86400, behavior: classical, format: text}

